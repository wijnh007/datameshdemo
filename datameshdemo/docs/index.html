<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataMesh Platform</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="4" r="2"/><circle cx="4" cy="20" r="2"/><circle cx="20" cy="20" r="2"/>
          <line x1="12" y1="6" x2="4" y2="18"/><line x1="12" y1="6" x2="20" y2="18"/><line x1="6" y1="20" x2="18" y2="20"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">DataMesh</span>
        <span class="brand-subtitle">Platform</span>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section">
        <span class="nav-section-title">Overview</span>
        <a href="#/home" class="nav-item" data-route="home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Data Products</span>
        <a href="#/domains" class="nav-item" data-route="domains">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
          Domains
        </a>
        <a href="#/catalog" class="nav-item" data-route="catalog">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          Catalog
        </a>
        <a href="#/graph" class="nav-item" data-route="graph">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Graph View
        </a>
        <a href="#/erd" class="nav-item" data-route="erd">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="8" height="5" rx="1"/>
            <rect x="14" y="3" width="8" height="5" rx="1"/>
            <rect x="2" y="16" width="8" height="5" rx="1"/>
            <rect x="14" y="16" width="8" height="5" rx="1"/>
            <line x1="10" y1="5.5" x2="14" y2="5.5"/>
            <line x1="12" y1="5.5" x2="12" y2="16"/>
            <line x1="10" y1="18.5" x2="14" y2="18.5"/>
          </svg>
          SID ERD Browser
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Marketplace</span>
        <a href="#/marketplace" class="nav-item" data-route="marketplace">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          Marketplace
        </a>
        <a href="#/orders" class="nav-item" data-route="orders">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="2"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="12" y2="16"/>
          </svg>
          My Orders
          <span class="nav-badge" id="order-badge" style="display:none">0</span>
        </a>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">DU</div>
        <div class="user-details">
          <span class="user-name">Demo User</span>
          <span class="user-role">Data Engineer</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main Content -->
  <main class="main-content" id="main-content"></main>

</div>

<!-- Notification Container -->
<div class="notifications" id="notifications"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Scripts (order matters: data first, then views, then app) -->
<script src="js/data.js"></script>
<script src="js/datamodels.js"></script>
<script src="js/views/home.js"></script>
<script src="js/views/catalog.js"></script>
<script src="js/views/marketplace.js"></script>
<script src="js/views/orders.js"></script>
<script src="js/views/graph.js"></script>
<script src="js/views/domains.js"></script>
<script src="js/views/erd-browser.js"></script>
<script src="js/app.js"></script>

</body>
</html>
