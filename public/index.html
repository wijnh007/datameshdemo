<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dmd1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 500px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #667eea; }

    button.add-btn {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #5a67d8; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats {
      font-size: 0.8rem;
      color: #718096;
    }

    .filters {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #718096;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #667eea; color: #667eea; }
    .filter-btn.active { border-color: #667eea; color: #667eea; font-weight: 600; }

    #clear-btn {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    #clear-btn:hover { color: #e53e3e; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child { border-bottom: none; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-word;
      cursor: text;
    }

    li.completed span {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .edit-input {
      flex: 1;
      border: 1.5px solid #667eea;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.95rem;
      outline: none;
    }

    li button.delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    li button.delete-btn:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .hint {
      text-align: center;
      color: #cbd5e0;
      font-size: 0.75rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>dmd1</h1>

    <div class="input-row">
      <input type="text" id="todo-input" placeholder="What needs to be done?" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <div class="toolbar">
      <span class="stats" id="stats"></span>
      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
      </div>
      <button id="clear-btn" onclick="clearCompleted()" style="display:none">Clear completed</button>
    </div>

    <ul id="todo-list"></ul>
    <p class="empty" id="empty-msg" style="display:none">Nothing here yet!</p>
    <p class="hint">Double-click a todo to edit it</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
