<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #667eea; }

    button.add-btn {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #5a67d8; }

    .stats {
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child { border-bottom: none; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.completed span {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li button.delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    li button.delete-btn:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="What needs to be done?" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <div class="stats" id="stats"></div>
    <ul id="todo-list"></ul>
    <p class="empty" id="empty-msg" style="display:none">No todos yet. Add one above!</p>
  </div>

  <script>
    let todos = [];

    async function load() {
      const res = await fetch('/api/todos');
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      const res = await fetch('/api/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (res.ok) {
        todos.push(await res.json());
        input.value = '';
        render();
      }
    }

    async function toggleTodo(id) {
      const res = await fetch(`/api/todos/${id}`, { method: 'PATCH' });
      if (res.ok) {
        const updated = await res.json();
        todos = todos.map(t => t.id === id ? updated : t);
        render();
      }
    }

    async function deleteTodo(id) {
      const res = await fetch(`/api/todos/${id}`, { method: 'DELETE' });
      if (res.ok) {
        todos = todos.filter(t => t.id !== id);
        render();
      }
    }

    function render() {
      const list = document.getElementById('todo-list');
      const empty = document.getElementById('empty-msg');
      const stats = document.getElementById('stats');

      const done = todos.filter(t => t.completed).length;
      stats.textContent = todos.length
        ? `${done} of ${todos.length} completed`
        : '';

      empty.style.display = todos.length ? 'none' : 'block';

      list.innerHTML = todos.map(t => `
        <li class="${t.completed ? 'completed' : ''}">
          <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})" />
          <span>${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Delete">&#x2715;</button>
        </li>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    load();
  </script>
</body>
</html>
